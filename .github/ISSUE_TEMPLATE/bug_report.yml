name: Bug report
description: Report a reproducible defect.
title: "fix: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide exact commands, inputs, and observed output.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime, package manager, repository version, and relevant configuration.
    validations:
      required: true
