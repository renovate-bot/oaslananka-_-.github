name: Renovate manual run

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: Run Renovate in lookup-only dry-run mode.
        required: true
        type: boolean
        default: true
      logLevel:
        description: Renovate log level.
        required: true
        type: choice
        options: [info, debug, trace]
        default: info

permissions:
  contents: read

jobs:
  renovate:
    name: Self-hosted Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout policy repository
        uses: actions/checkout@v6.0.2

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.14
        with:
          configurationFile: config.js
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'lookup' || '' }}
