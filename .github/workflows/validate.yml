name: Validate repository policy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Policy and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Validate local policy invariants
        run: python scripts/validate_repo_policy.py

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Validate Renovate presets
        run: |
          npx --yes --package renovate -- renovate-config-validator --strict --no-global renovate-config.json default.json renovate.json
